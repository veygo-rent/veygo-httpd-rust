<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify your email</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f6fb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #1f2937;
        }

        .wrapper {
            width: 100%;
            padding: 32px 16px;
            box-sizing: border-box;
        }

        .card {
            max-width: 480px;
            margin: 0 auto;
            background-color: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }

        .header {
            padding: 28px 32px 12px;
        }

        .brand {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #7691EB;
            margin: 0 0 20px;
        }

        .title {
            margin: 0;
            font-size: 1.75rem;
            line-height: 1.25;
            color: #111827;
        }

        .content {
            padding: 0 32px 32px;
        }

        .intro {
            margin: 16px 0 0;
            font-size: 1rem;
            line-height: 1.6;
            color: #4b5563;
        }

        .code-box {
            margin: 28px 0 24px;
            padding: 20px 24px;
            background: linear-gradient(180deg, #f8faff 0%, #eef3ff 100%);
            border: 1px solid #dbe5ff;
            border-radius: 14px;
            text-align: center;
        }

        .code-label {
            margin: 0 0 10px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }

        .code {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.22em;
            color: #4f6fdc;
        }

        .note {
            margin: 0;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #6b7280;
        }

        .footer {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #6b7280;
        }

        @media (max-width: 520px) {
            .wrapper {
                padding: 20px 12px;
            }

            .header,
            .content {
                padding-left: 20px;
                padding-right: 20px;
            }

            .title {
                font-size: 1.5rem;
            }

            .code {
                font-size: 1.7rem;
                letter-spacing: 0.16em;
            }
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="card">
        <div class="header">
            <p class="brand">Veygo</p>
            <h1 class="title">Verify your email</h1>
        </div>
        <div class="content">
            <p class="intro">
                Use the verification code below to continue signing in to your Veygo account.
            </p>

            <div class="code-box">
                <p class="code-label">Verification code</p>
                <p class="code">{{ verification_code }}</p>
            </div>

            <p class="note">
                This code will expire shortly. If you did not request this email, you can safely ignore it.
            </p>

            <div class="footer">
                Best regards,<br>
                The Veygo Team
            </div>
        </div>
    </div>
</div>
</body>
</html>
